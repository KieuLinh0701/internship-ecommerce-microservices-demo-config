server:
  port: 9007

grpc:
  server:
    port: 9097
  client:
    customer-service:
      address: discovery:///CUSTOMER-SERVICE
      negotiation-type: plaintext
    inventory-service:
      address: discovery:///INVENTORY-SERVICE
      negotiation-type: plaintext
    payment-service:
      address: discovery:///PAYMENT-SERVICE
      negotiation-type: plaintext
    cart-service:
      address: discovery:///CART-SERVICE
      negotiation-type: plaintext
  retry:
    max-attempts: 3
    base-delay-ms: 100
  timeout: 5s

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/order_service_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: inventory-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
    listener:
      ack-mode: RECORD

eureka:
  instance:
    metadata-map:
      grpcPort: 9096

openapi:
  title: Order Service API
  description: Order Service API Documentation
  server-url: http://localhost:9000/api/orders
  server-description: Gateway - Local

kafka:
  consumer:
    dlt:
      suffix: ".DLT"
    retry:
      initial-interval-ms: 2000
      multiplier: 2.0
      max-kafka-retry: 3
      max-manual-retry: 3

order:
  payment-timeout-hours: 24

outbox:
  scheduler:
    fixed-delay-ms: 5000
    retry-delay-seconds: 5

temp-image-cleanup:
  fixed-rate-ms: 3600000
  ttl-minutes: 60

feedback-image:
  max-files: 5