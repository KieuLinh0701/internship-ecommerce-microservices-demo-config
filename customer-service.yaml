server:
  port: 9003

grpc:
  server:
    port: 9093

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/customer_service_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

eureka:
  instance:
    metadata-map:
      grpcPort: 9093

openapi:
  title: Customer Service API
  description: Customer Service API Documentation
  server-url: http://localhost:9000/api/customer
  server-description: Gateway - Local