server:
  port: 9004

grpc:
  server:
    port: 9094
  client:
    customer-service:
      address: discovery:///CUSTOMER-SERVICE
      negotiation-type: plaintext
    inventory-service:
      address: discovery:///INVENTORY-SERVICE
      negotiation-type: plaintext
  retry:
    max-attempts: 3
    base-delay-ms: 100
  timeout: 5s

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cart_service_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: cart-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
    listener:
      ack-mode: RECORD

eureka:
  instance:
    metadata-map:
      grpcPort: 9094

openapi:
  title: Cart Service API
  description: Cart Service API Documentation
  server-url: http://localhost:9000/api/cart
  server-description: Gateway - Local

kafka:
  consumer:
    dlt:
      suffix: ".DLT"
    retry:
      initial-interval-ms: 2000
      multiplier: 2.0
      max-kafka-retry: 3
      max-manual-retry: 3