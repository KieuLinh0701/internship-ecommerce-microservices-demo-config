server:
  port: 9008

grpc:
  server:
    port: 9098
  client:
    auth-service:
      address: discovery:///auth-service
      negotiation-type: plaintext
    customer-service:
      address: discovery:///customer-service
      negotiation-type: plaintext
  retry:
    max-attempts: 3
    base-delay-ms: 100
  timeout: 5s

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_service_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: notification-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
    listener:
      ack-mode: RECORD
      observation-enabled: false

eureka:
  instance:
    metadata-map:
      grpcPort: 9097

websocket:
  allowed-origins: http://localhost:3000

openapi:
  title: Notification Service API
  description: Notification Service API Documentation
  server-url: http://localhost:9000/api/notifications
  server-description: Gateway - Local

kafka:
  consumer:
    dlt:
      suffix: ".DLT"
    retry:
      initial-interval-ms: 2000
      multiplier: 2.0
      max-kafka-retry: 3
      max-manual-retry: 3